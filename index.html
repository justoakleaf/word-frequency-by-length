        // TODO handle punctuation, apostrophes

        // filter for relevant words
        const unique = (arr) => [...new Set(arr)];
        const desiredTokens = unique(textTokens).filter((e) => e.length == desiredLength)

        // then order by popularity




        // write html
        html = "";

        desiredTokens.forEach(function(e, i) {

            html += "<tr>" + "<td>" + e + "</td>" +  "<td>" + freqs[e] + "</td>"  + "</tr>";
        })

      } catch (error) {
